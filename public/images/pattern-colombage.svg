<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  
  <defs>
    <pattern id="colombage" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="transparent"></rect>
      <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="1">
        
        <line x1="0" y1="50" x2="100" y2="50"></line>
        <line x1="50" y1="0" x2="50" y2="100"></line>
        
        <line x1="0" y1="0" x2="50" y2="50"></line>
        <line x1="50" y1="0" x2="0" y2="50"></line>
        <line x1="50" y1="50" x2="100" y2="100"></line>
        <line x1="100" y1="50" x2="50" y2="100"></line>
      </g>
    </pattern>
  </defs>
  <rect width="200" height="200" fill="url(#colombage)" color="#c85226"></rect>
</svg>